# reviewd global config
# Location: $XDG_CONFIG_HOME/reviewd/config.yaml (default: ~/.config/reviewd/config.yaml)
#
# Run `reviewd init` to copy this file to the right location.
# Uncomment and customize the settings you need.

# --- Provider credentials (configure one or both) ---

# GitHub (requires a Personal Access Token with `repo` scope)
# github:
#   token: ${GITHUB_TOKEN}

# BitBucket (requires App Passwords with pullrequest:read + pullrequest:write)
# Map workspace names to auth tokens:
# bitbucket:
#   my-workspace: ${BB_AUTH_TOKEN}
#   other-workspace: ${OTHER_BB_TOKEN}

# --- AI CLI settings ---

# AI CLI to use: "claude" or "gemini" (default: claude)
# Can be overridden per repo.
# cli: claude

# Model passed as --model to the CLI. Uses CLI default if omitted.
# Can be overridden per repo.
# model: claude-sonnet-4-5-20250514

# Extra CLI arguments passed to claude/gemini (e.g. --allowedTools, --policy)
# cli_args:
#   - --some-flag
#   - value

# --- Polling ---

# How often to check for new PRs in daemon mode (seconds)
# poll_interval_seconds: 60

# --- Review appearance ---

# Title shown as the H2 heading of the summary comment (supports markdown)
# review_title: "reviewd ({cli})"

# Footer disclaimer appended to every summary comment
# footer: "Automated review by [reviewd](https://github.com/simion/reviewd). Findings are AI-generated — use your judgment."

# Global review instructions applied to all repos.
# Per-project instructions in .reviewd.yaml are appended after these.
# instructions: |
#   Be concise and constructive.
#   Every issue must include a concrete suggested fix.

# --- PR filtering ---

# Skip PRs whose title contains any of these patterns (case-insensitive)
# skip_title_patterns:
#   - '[no-review]'
#   - '[wip]'
#   - '[no-claudiu]'

# Skip PRs from these authors (e.g. bots)
# skip_authors: []

# --- Per-repo options (set in each repo's .reviewd.yaml) ---
#
# skip_severities:              # exclude severities from the review entirely
#   - nitpick                   #   (also removes them from the prompt)
#   - good                      #   options: critical, suggestion, nitpick, good
# inline_comments_for:          # which severities get inline comments
#   - critical
#   - suggestion
# max_inline_comments: 5        # if exceeded, skip all inline (null = unlimited)
# show_overview: false           # show AI overview paragraph in summary comment
# min_diff_lines: 0             # skip initial PR review if fewer changed lines (0 = disabled)
# min_diff_lines_update: 5      # skip re-review on pushed commits if fewer changed lines
# review_cooldown_minutes: 30   # don't re-review same PR within N minutes
# approve_if_no_critical: false  # deprecated, use auto_approve instead
# auto_approve:
#   enabled: true
#   max_diff_lines: 50          # skip approval if diff exceeds this
#   max_severity: nitpick       # highest allowed: good < nitpick < suggestion < critical
#   max_findings: 3             # skip approval if more findings than this
#   rules: |                    # custom rules sent to the AI for approval decision
#     Approve only if no security-related changes.
#     Approve only if no changes to DB models or migrations.
# critical_task: false           # create a PR task on critical findings (BitBucket only)
# critical_task_message: "Critical issue found by AI review. Dismiss if false positive."
# test_commands:                 # commands to run in worktree during review
#   - uv run ruff check .
#   - uv run pytest tests/ -x -q

# --- Repos ---

repos: []
  # - name: my-gh-repo
  #   repo_slug: owner/my-gh-repo   # owner/repo for GitHub API
  #   path: ~/repos/my-gh-repo
  #   provider: github
  #
  # - name: my-bb-project
  #   path: ~/repos/my-bb-project
  #   provider: bitbucket
  #   workspace: my-workspace          # must match a key in bitbucket section
  #   # cli: gemini              # override per repo
  #   # model: gemini-2.5-pro    # override per repo

# --- State ---

# SQLite database for tracking reviews and posted comments
# state_db: ~/.local/share/reviewd/state.db
